<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enter the Password 🔐</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#1e293b,#020617);
  font-family:'Poppins',sans-serif;
  color:#fff;
}

.container{
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(12px);
  padding:40px 35px;
  border-radius:18px;
  text-align:center;
  width:320px;
  box-shadow:0 25px 60px rgba(0,0,0,.5);
}

h2{
  margin-bottom:10px;
  font-weight:600;
}

p{
  font-size:14px;
  opacity:.85;
}

input{
  width:100%;
  margin-top:20px;
  padding:12px;
  border-radius:12px;
  border:none;
  outline:none;
  font-size:15px;
  text-align:center;
}

button{
  margin-top:18px;
  padding:10px 22px;
  border:none;
  border-radius:20px;
  background:#e5e7eb;
  color:#020617;
  font-weight:600;
  cursor:pointer;
}

.message{
  margin-top:18px;
  font-size:14px;
  min-height:20px;
}

.success{
  color:#22c55e;
}

.error{
  color:#f87171;
}

.actions{
  margin-top:18px;
  display:none;
  gap:12px;
  justify-content:center;
}

.actions button{
  background:#ffffff;
}
</style>
</head>

<body>

<div class="container">
  <h2>🔐 Enter the Password</h2>
  <p>Only one person can open this</p>

  <input type="password" id="password" placeholder="Enter password">

  <button onclick="checkPassword()">Check Me</button>

  <div class="message" id="msg"></div>

  <div class="actions" id="actions">
    <button onclick="goLife()">✨ Enter the Future</button>
    <button onclick="goBack()">⬅ Back</button>
  </div>
</div>

<script>
function checkPassword(){
  const pass = document.getElementById("password").value;
  const msg = document.getElementById("msg");
  const actions = document.getElementById("actions");

  if(pass === "19042906"){
    msg.textContent = "Your password is correct 💖";
    msg.className = "message success";
    actions.style.display = "flex";
  }else{
    msg.textContent = "hey matti olunga podu 😏";
    msg.className = "message error";
    actions.style.display = "none";
  }
}

function goLife(){
  window.location.href = "life1.html";
}

function goBack(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
