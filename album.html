<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Memories ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#1e293b,#020617);
  font-family:'Inter',sans-serif;
  color:#fff;
}

/* header */
.header{
  text-align:center;
  padding:40px 20px 20px;
}
.header h1{
  font-size:34px;
  font-weight:500;
  letter-spacing:1px;
}
.header p{
  margin-top:8px;
  opacity:.8;
  font-size:14px;
}

/* gallery */
.gallery{
  width:95%;
  max-width:1200px;
  margin:30px auto 120px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:26px;
}

/* photo card */
.card{
  position:relative;
  height:360px;
  border-radius:22px;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 25px 55px rgba(0,0,0,.55);
  transition:.5s ease;
}
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform .6s ease;
}
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.55),transparent 60%);
  opacity:0;
  transition:.4s;
}

.card:hover{
  transform:translateY(-10px) scale(1.02);
}
.card:hover img{
  transform:scale(1.12);
}
.card:hover::after{
  opacity:1;
}

/* floating buttons */
.action-bar{
  position:fixed;
  bottom:26px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:20px;
  z-index:10;
}

.action-bar button{
  padding:14px 34px;
  border-radius:30px;
  border:1px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(10px);
  color:#fff;
  font-size:15px;
  font-weight:500;
  cursor:pointer;
  transition:.3s;
}
.action-bar button:hover{
  background:rgba(255,255,255,.3);
}
</style>
</head>

<body>
