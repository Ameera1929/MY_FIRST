<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Gifts 🎁</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#1e3a8a,#020617);
  font-family:'Poppins',sans-serif;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* layout */
.container{text-align:center}
.gifts{display:flex;flex-direction:column;gap:30px;align-items:center}
.row{display:flex;gap:30px}

/* gift */
.gift{
  width:160px;height:160px;
  background:linear-gradient(145deg,#ef4444,#b91c1c);
  border-radius:18px;
  position:relative;
  cursor:pointer;
}
.gift::before{
  content:"";
  position:absolute;
  top:70px;left:0;right:0;
  height:14px;background:white;
}
.gift::after{
  content:"";
  position:absolute;
  top:0;bottom:0;
  left:72px;width:14px;background:white;
}

/* full screen */
.full{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#020617;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
  text-align:center;
}

/* content */
img{width:260px;border-radius:18px}
.letter{
  background:#fff;color:#000;
  padding:25px;border-radius:14px;
  max-width:600px;
}
.msg{font-size:24px;color:#fde68a}

/* buttons */
.bottom-buttons{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:14px;
}
button{
  padding:10px 28px;
  border-radius:25px;
  border:none;
  cursor:pointer;
}
</style>

</head>

<body>

<!-- MAIN GIFTS -->

<div class="container" id="main">
  <div class="gifts">
    <div class="row">
      <div class="gift" onclick="openGift(1)"></div>
      <div class="gift" onclick="openGift(2)"></div>
    </div>
    <div class="gift" onclick="openGift(3)"></div>
  </div>
</div>

<!-- BUTTONS -->

<div class="bottom-buttons">
  <button onclick="goBack()">⬅ Back</button>
  <button onclick="goNext()">Go ➡</button>
</div>

<script>

function openGift(n){

  let content = "";

  // GIFT 1 → BOUQUET
  if(n===1){
    content = `
      <img src="images/photo41.png">
      <p>Love you ma ❤️</p>
      <small>Tap to go back 💖</small>
    `;
  }

  // GIFT 2 → LETTER
  if(n===2){
    content = `
      <div class="letter">
        <h3>My Dearest Husband 💖</h3> <p> Today is your special day, and I just want to take a moment to tell you how 
          much you mean to me. 🎂✨ From the day you came into my life, 
          everything changed in the most beautiful way. 🌅<br>
           You are not just my fiancé anymore, you are my soulmate, my best friend, and soon… my husband. 💍<br> 
           Every smile of yours brightens my darkest days. 😊 Every word you say stays in my heart forever. 💌<br> 
           When I am lost, your love guides me back. 🕯️ I can’t imagine my life without you, not even for a second.⏳Your hugs are my safest place. 🤗<br>
            Your laughter is my favorite melody. 🎶 <br>I miss you more than words can ever express. 💔<br> Even when we are apart, you are always in my thoughts. 💭the way you care, the way you love, the way you understand me without me saying a word… it amazes me every single day. 🌟<br> 
            You are my strength when I feel weak. 💪 you are my comfort when I feel scared. 🛋️I feel so lucky that soon I will be calling you my husband. ❤️ I dream about our future together—our home, our laughter, our adventures. 🏡🌍 Every moment with you feels like magic. ✨ You have shown me what true love really is. 💘 I love you more than words can ever capture. 📝<br> 
            I love you more than time, more than distance, more than anything in this world. 🌎You are my forever, my always, my everything. 🌹On this special day, I wish you happiness beyond measure. 🎉<br>
             I wish your dreams come true, your heart stays light, and your days are filled with laughter. 😄<br>
              Happy Birthday, my love! 🥰🎂 I can’t wait for the life we are about to build together. 🏠💑<br> 
              Love you mmulu 💖, miss you so much 😢, and always yours. 🖤
        </p>
        <small>Tap to go back 💖</small>
      </div>
    `;
  }

  // GIFT 3 → MESSAGE
  if(n===3){
    content = `
      <div class="msg">Ameera ta kelu 💖</div>
      <small>Tap to go back 💖</small>
    `;
  }

  // SHOW FULL SCREEN
  document.body.innerHTML += `
    <div class="full" onclick="closeFull()">
      ${content}
    </div>
  `;
}

function closeFull(){
  document.querySelector(".full").remove();
}

function goBack(){
  window.location.href="cake.html";
}
function goNext(){
  window.location.href="album.html";
}

</script>

</body>
</html>
