<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Future ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<style>
  body{
    margin:0;
    min-height:100vh;
    background: radial-gradient(circle at top, #1e3a8a, #020617);
    font-family: 'Playfair Display', serif;
    color:#f0f0f0;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:40px 20px;
    overflow-y: auto;
  }

  .letter-container{
    max-width:800px;
    background:rgba(0,0,0,0.5);
    padding:30px 40px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.7);
    line-height:1.7;
    font-size:17px;
  }

  h1{
    text-align:center;
    margin-bottom:20px;
    color:#f7c873;
    font-size:2.8rem;
  }

  p{ margin-bottom:15px; }

  .buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:25px;
  }

  button{
    padding:12px 28px;
    border:none;
    border-radius:25px;
    background:#f7c873;
    color:#020617;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    transition:all 0.3s ease;
  }

  button:hover{ transform:scale(1.05); }
</style>
</head>

<body>

<div class="letter-container">
  <h1>Once again wish you many more happy returns of the day thangameyy</h1>
  <div class="buttons">
    <button onclick="goBack()">⬅ Back</button>
    <button onclick="goHome()">🏠 Home</button>
  </div>
</div>

<script>
function goBack(){ window.history.back(); }
function goHome(){ window.location.href='index.html'; }
</script>

</body>
</html>
