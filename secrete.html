<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SECRETE Page 🔐</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  font-family:'Inter',sans-serif;
  color:#ffffff;
}

.secrete-container{
  background:linear-gradient(160deg,#020617,#020617,#020617);
  padding:40px 30px 80px;
  border-radius:18px;
  width:90%;
  max-width:420px;
  text-align:center;
  box-shadow:0 30px 60px rgba(0,0,0,.6);
  position:relative;
}

.secrete-container h2{
  margin-bottom:18px;
  font-weight:600;
  letter-spacing:.6px;
}

.secrete-container p{
  font-size:14px;
  color:#cbd5f5;
  margin-bottom:28px;
  line-height:1.7;
}

/* reveal button */
.reveal-btn{
  padding:12px 30px;
  background:linear-gradient(135deg,#9ca3af,#e5e7eb);
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
  color:#020617;
  width:100%;
  transition:.3s ease;
}
.reveal-btn:hover{transform:scale(1.05)}

.secrete-number{
  margin-top:28px;
  font-size:30px;
  font-weight:700;
  display:none;
  animation:fadeIn .6s ease;
  color:#facc15;
  letter-spacing:3px;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(12px)}
  to{opacity:1; transform:translateY(0)}
}

/* bottom buttons */
.bottom-actions{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:14px;
  width:85%;
}

.action-btn{
  flex:1;
  padding:12px 0;
  border:none;
  border-radius:30px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:.3s ease;
}

/* back */
.back-btn{
  background:rgba(255,255,255,.15);
  color:#ffffff;
  border:1px solid rgba(255,255,255,.25);
}
.back-btn:hover{background:rgba(255,255,255,.25)}

/* continue */
.continue-btn{
  background:linear-gradient(135deg,#facc15,#fde047);
  color:#020617;
  box-shadow:0 10px 30px rgba(250,204,21,.45);
}
.continue-btn:hover{transform:scale(1.05)}
</style>
</head>

<body>

<div class="secrete-container">
  <h2>🔒 Secrete Message</h2>
  <p>
    Unakku secrete password solluren.<br>
    Thevapadure nerathula use pannikko 🤍
  </p>

  <button class="reveal-btn" onclick="openSecrete()">Tap to Reveal</button>

  <div class="secrete-number" id="secreteNumber">19042906</div>

  <div class="bottom-actions">
    <button class="action-btn back-btn" onclick="goBack()">⬅ Back</button>
    <button class="action-btn continue-btn" onclick="goNext()">Continue ➜</button>
  </div>
</div>

<script>
function openSecrete(){
  document.getElementById("secreteNumber").style.display = "block";
}

function goNext(){
  window.location.href = "hug.html";
}

function goBack(){
  window.location.href = "contract.html";
}
</script>

</body>
</html>
